{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<section class="auth-card">
  <div class="eyebrow">LOCAL SCHOOL EDITION</div>
  <h1>CampusMetric</h1>
  <p class="lead">开源校园评价系统 · 字典驱动 · 自动积分</p>
  <form method="post" class="stack-form">
    <input type="hidden" name="next" value="{{ next_url }}">
    <label>账号<input name="username" autocomplete="username" required autofocus></label>
    <label>密码<input type="password" name="password" autocomplete="current-password" required></label>
    <button class="primary-button" type="submit">登录系统</button>
  </form>
</section>
{% endblock %}
